<!DOCTYPE html>
<html lang="en">
    <headd>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale">
        <script src="https://kit.fontawesome.com/f9dc94ec3b.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="css/login.css">

        <title>sign in & sign up</title>
       
        

    </headd>

    <body>
<div class="container">
    <div class="forms-container">
        <div class="signin-signup">
            <form action="" method="post" class="sign-in-form">
                <h2 class="title">Sign in</h2>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password"  placeholder="Password">
                </div>
                <button type="submit" class="btn solid">Login</button>

                <p class="social-text"> Or sign in with social platforms</p>
                <div class="social-media">
                   
                    <a href="#" class="social-icon">
                        <i class="fab fa-facebook"></i>
                    </a>

                    <a href="#" class="social-icon">
                        <i class="fab fa-google"></i>
                    </a>

                    

                </div>
            </form>


            <form action="" method="post" class="sign-up-form">
                <h2 class="title">Sign up</h2>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username">
                </div>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="text" placeholder="Email">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password"  placeholder="Password">
                </div>
                <button type="submit" class="btn solid">sign up</button>

                <p class="social-text"> Or sign in with social platforms</p>
                <div class="social-media">
                   
                    <a href="#" class="social-icon">
                        <i class="fab fa-facebook"></i>
                    </a>

                    <a href="#" class="social-icon">
                        <i class="fab fa-google"></i>
                    </a>

                    

                </div>
            </form>
    </div>

</div>
<div class="panales-container">
    <div class="panel left-panel">
        <div class="content">
            <h3>The whole grocery store at your fingerprint</h3>
            <button class="btn transparent" id="sign-up-btn">Sign In</button>
        </div>
        <img scr="images/signin.jpg" class="image" alt="">
    </div>

</div>
    </body>
</html>
