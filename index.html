<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="js/script.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=YourChosenFont&display=swap" rel="stylesheet">
    <title>Green Supermarket</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="images/logo.png" alt="YourLogo" class="logo-img">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="loginSignup">Login/Sign Up</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact us.html">Contact Us</a>
                    </li>
                </ul>
                <div class="search-bar">
                    <input type="text" id="searchBar" placeholder="Search products..." class="custom-search">
                    <button onclick="search()" class="search-btn">Search</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="background-transition">
        <img src="images/img 1.jpg" alt="Background Image" class="background-image">
    </div>

    <!-- Other content goes here -->

    <footer class="footer">
        <p>© 2023 - Green Supermarket - Designed & HTML by Group 05</p>
    </footer>

    <script>
        function animateLoginSignup() {
            const loginSignup = document.getElementById('loginSignup');
            loginSignup.addEventListener('mouseover', () => {
                loginSignup.style.transform = 'scale(1.1)';
            });

            loginSignup.addEventListener('mouseout', () => {
                loginSignup.style.transform = 'scale(1)';
            });
        }

        function search() {
            const searchTerm = document.getElementById('searchBar').value;
            // Implement your search functionality here
            console.log(`Searching for: ${searchTerm}`);
        }

        animateLoginSignup();
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
