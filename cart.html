<html>
    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--==Title==-->
    <title>Green Supermarket</title>
    
    <!--==Stylesheet==-->
    <link rel="stylesheet" type="text/css" href="css/styles.css"/>
    <link rel="stylesheet" type="text/css" href="css/cart.css"/>
    <!--==Fav-icon==-->
    <link rel="shortcut icon" href="images/fav-icon.png"/>
    
    <!--==Using-Font-Awesome==-->
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>
    
    <!--==Import-Font-Family==-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    </head>


    <body>

     <!--==Navigation==-->
     <nav class="navigation">
        <!--logo-->
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="YourLogo" class="logo-img">
        </a>
        <!--menu-btn-->
        <input type="checkbox" class="menu-btn" id="menu-btn">
        <label for="menu-btn" class="menu-icon">
            <span class="nav-icon"></span>
        </label>
        <!--menu-->
        <ul class="menu">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="#category">Products</a></li>
            <li><a href="#clients">Reviews</a></li>
            
        </ul>
        <!--right-nav-(cart-like)-->
        <div class="right-nav">
            <!--User-->
            <a href="#" class="user">
                <i class="far fa-user"></i>
                
            </a>
            <!--cart----->
            <a href="#" class="cart1">
                <i class="fas fa-shopping-cart"></i>
                <span>0</span>
            </a>
        </div>
    </nav>
    <!--nav-end--------------------->

    <main class="container1">

        <h1 class="heading">
          <ion-icon name="cart-outline"></ion-icon> Shopping Cart
        </h1>
    
        <div class="item-flex">
    
          <!--
           - checkout section
          -->
          <section class="checkout">
    
            <h2 class="section-heading">Payment Details</h2>
    
            <div class="payment-form">
    
              <div class="payment-method">
    
                <button class="method selected">
                  <ion-icon name="card"></ion-icon>
    
                  <span>Credit Card</span>
    
                  <ion-icon class="checkmark fill" name="checkmark-circle"></ion-icon>
                </button>
    
                <button class="method">
                  <ion-icon name="logo-paypal"></ion-icon>
    
                  <span>PayPal</span>
    
                  <ion-icon class="checkmark" name="checkmark-circle-outline"></ion-icon>
                </button>
    
              </div>

              <form action="#">
    
                <div class="cardholder-name">
                  <label for="cardholder-name" class="label-default">Cardholder name</label>
                  <input type="text" name="cardholder-name" id="cardholder-name" class="input-default">
                </div>
    
                <div class="card-number">
                  <label for="card-number" class="label-default">Card number</label>
                  <input type="number" name="card-number" id="card-number" class="input-default">
                </div>
    
                <div class="input-flex">
    
                  <div class="expire-date">
                    <label for="expire-date" class="label-default">Expiration date</label>
    
                    <div class="input-flex">
    
                      <input type="number" name="day" id="expire-date" placeholder="31" min="1" max="31"
                        class="input-default">
                      /
                      <input type="number" name="month" id="expire-date" placeholder="12" min="1" max="12"
                        class="input-default">
    
                    </div>
                  </div>
    

    </body>
</html>
